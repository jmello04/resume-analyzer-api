services:
  api:
    build: .
    container_name: resume_analyzer_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-resume_analyzer}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - resume_network

  db:
    image: postgres:16-alpine
    container_name: resume_analyzer_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-resume_analyzer}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-resume_analyzer}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - resume_network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  resume_network:
    driver: bridge
