version: "3.9"

services:
  api:
    build: .
    container_name: resume_analyzer_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/resume_analyzer
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - resume_network

  db:
    image: postgres:16-alpine
    container_name: resume_analyzer_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: resume_analyzer
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - resume_network

volumes:
  postgres_data:

networks:
  resume_network:
    driver: bridge
