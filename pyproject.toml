[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "-v --tb=short"

[tool.coverage.run]
source = ["app"]
omit = ["app/__init__.py", "app/*/__init__.py", "app/*/*/__init__.py"]

[tool.coverage.report]
show_missing = true
skip_covered = false
