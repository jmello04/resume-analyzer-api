name: Reportar Bug
description: Encontrou um problema? Descreva-o aqui.
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Obrigado por reportar um bug! Preencha os campos abaixo para nos ajudar a reproduzir e corrigir o problema.

  - type: textarea
    id: descricao
    attributes:
      label: Descrição do problema
      description: Descreva o que aconteceu e o que era esperado.
      placeholder: "Ao enviar um PDF com X características, a API retorna Y em vez de Z..."
    validations:
      required: true

  - type: textarea
    id: reproducao
    attributes:
      label: Passos para reproduzir
      description: Liste os passos exatos para reproduzir o problema.
      placeholder: |
        1. Enviar um PDF via POST /api/v1/analyze
        2. O arquivo tem as seguintes características...
        3. Observar o erro na resposta
    validations:
      required: true

  - type: textarea
    id: comportamento-esperado
    attributes:
      label: Comportamento esperado
      description: O que deveria ter acontecido?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs e mensagem de erro
      description: Cole aqui a mensagem de erro completa ou os logs relevantes.
      render: shell

  - type: input
    id: versao-python
    attributes:
      label: Versão do Python
      placeholder: "3.12.0"
    validations:
      required: true

  - type: input
    id: sistema-operacional
    attributes:
      label: Sistema operacional
      placeholder: "Ubuntu 22.04 / Windows 11 / macOS 14"
    validations:
      required: true

  - type: dropdown
    id: ambiente
    attributes:
      label: Ambiente
      options:
        - Docker (docker-compose)
        - Local (sem Docker)
        - CI/CD
    validations:
      required: true
